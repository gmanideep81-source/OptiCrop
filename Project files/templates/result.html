<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OptiCrop — Result</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12201A; --surface:#1B2E23; --amber:#C9A75E;
    --sage:#8CA88A; --text:#F4F1E8; --muted:#9FB09B; --rule:#2E4736;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:radial-gradient(circle at 50% 0%, rgba(201,167,94,0.08), transparent 45%), var(--bg);
    color:var(--text);
    font-family:'Space Grotesk', sans-serif;
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .card{
    max-width:440px; width:100%;
    background:var(--surface);
    border:1px solid rgba(201,167,94,0.15);
    border-radius:20px;
    padding:48px 40px;
    text-align:center;
    box-shadow:0 30px 80px rgba(0,0,0,0.45);
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--sage); margin-bottom:20px;
  }
  .crop{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:3rem;
    color:var(--amber);
    margin-bottom:8px;
    text-transform:capitalize;
  }
  .sub{ color:var(--muted); font-size:0.9rem; margin-bottom:32px; }
  a.back{
    display:inline-block;
    padding:13px 28px;
    background:transparent;
    border:1.5px solid var(--rule);
    color:var(--text);
    text-decoration:none;
    border-radius:10px;
    font-weight:500;
    font-size:0.9rem;
    transition:border-color 0.2s ease, color 0.2s ease;
  }
  a.back:hover{ border-color:var(--amber); color:var(--amber); }
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Recommendation</div>
    <div class="crop">{{ crop }}</div>
    <p class="sub">Best match for the soil and climate conditions you entered.</p>
    <a href="/" class="back">Run Another Analysis</a>
  </div>
</body>
</html>
